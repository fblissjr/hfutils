[project]
name = "hfutils"
version = "0.1.0"
author = "Fred Bliss"
description = "HF utilities"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "huggingface-hub[hf-xet]>=1.3.4",
    "tqdm>=4.67.1",
]

[project.scripts]
hfutils = "hfutils.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/hfutils"]
